<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" fill="none">
  <rect width="600" height="220" rx="12" fill="#0a0a0a"/>

  <!-- Icon: open book with text lines -->
  <g transform="translate(276, 20)">
    <!-- Glow -->
    <circle cx="24" cy="44" r="38" fill="#22c55e" opacity="0.04"/>
    <circle cx="24" cy="44" r="26" fill="#22c55e" opacity="0.07"/>

    <!-- Book shape -->
    <path d="M4 22 L24 12 L44 22 L44 72 L24 62 L4 72 Z" stroke="#22c55e" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="24" y1="12" x2="24" y2="62" stroke="#22c55e" stroke-width="1.5" opacity="0.35"/>

    <!-- Left page lines -->
    <line x1="9" y1="33" x2="20" y2="29" stroke="#22c55e" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="9" y1="41" x2="20" y2="37" stroke="#22c55e" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="9" y1="49" x2="17" y2="46" stroke="#22c55e" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

    <!-- Right page lines -->
    <line x1="28" y1="29" x2="39" y2="33" stroke="#22c55e" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="28" y1="37" x2="39" y2="41" stroke="#22c55e" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="28" y1="46" x2="36" y2="49" stroke="#22c55e" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

    <!-- Cursor / spark -->
    <circle cx="24" cy="22" r="2" fill="#22c55e" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="300" y="128" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="34" font-weight="700" fill="#f0f0f0" letter-spacing="-0.5">docs-oracle</text>

  <!-- Divider -->
  <line x1="250" y1="142" x2="350" y2="142" stroke="#22c55e" stroke-width="2" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="300" y="164" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="13" fill="#555" letter-spacing="0.5">query any docs powered by mintlify</text>

  <!-- kalil0321 branding -->
  <text x="300" y="196" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="11" fill="#3a3a3a" letter-spacing="2">
    <tspan fill="#22c55e">◆</tspan>  kalil0321
  </text>
</svg>
