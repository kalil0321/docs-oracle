<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" fill="none">
  <rect width="600" height="220" rx="12" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Icon: open book with text lines -->
  <g transform="translate(276, 20)">
    <!-- Glow -->
    <circle cx="24" cy="44" r="38" fill="#22c55e" opacity="0.05"/>
    <circle cx="24" cy="44" r="26" fill="#22c55e" opacity="0.08"/>

    <!-- Book shape -->
    <path d="M4 22 L24 12 L44 22 L44 72 L24 62 L4 72 Z" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <!-- Spine -->
    <line x1="24" y1="12" x2="24" y2="62" stroke="#16a34a" stroke-width="1.5" opacity="0.3"/>

    <!-- Left page lines -->
    <line x1="9" y1="33" x2="20" y2="29" stroke="#16a34a" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="9" y1="41" x2="20" y2="37" stroke="#16a34a" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="9" y1="49" x2="17" y2="46" stroke="#16a34a" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

    <!-- Right page lines -->
    <line x1="28" y1="29" x2="39" y2="33" stroke="#16a34a" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="28" y1="37" x2="39" y2="41" stroke="#16a34a" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>
    <line x1="28" y1="46" x2="36" y2="49" stroke="#16a34a" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

    <!-- Cursor / spark -->
