  </g>

  <!-- Title -->
  <text x="300" y="128" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="34" font-weight="700" fill="#171717" letter-spacing="-0.5">docs-oracle</text>

  <!-- Divider -->
  <line x1="250" y1="142" x2="350" y2="142" stroke="#16a34a" stroke-width="2" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="300" y="164" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="13" fill="#888" letter-spacing="0.5">query any docs powered by mintlify</text>

  <!-- kalil0321 branding -->
  <text x="300" y="196" text-anchor="middle" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', 'Fira Code', Menlo, monospace" font-size="11" fill="#bbb" letter-spacing="2">
    <tspan fill="#16a34a">◆</tspan>  kalil0321
